<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — Babounette</title>
  <meta name="description" content="Catalogue des pièces Babounette — collection enfant de Babetchka Vintage.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand brand-title" href="index.html">Babounette</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainMenu"
        aria-controls="mainMenu"
        aria-expanded="false"
        aria-label="Ouvrir le menu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link active" href="catalogue.html">Catalogue</a></li>
          <li class="nav-item"><a class="nav-link" href="univers.html">Univers</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>

    <section class="page-header">
      <div class="container text-center">
        <h1 class="section-title">Le catalogue</h1>
        <p class="section-subtitle mx-auto">
          Toutes les pièces Babounette visibles en boutique.
        </p>
      </div>
    </section>

    <section class="pb-5">
      <div class="container">

        <div class="filter-box mb-5">
          <div class="row g-3">

            <div class="col-md-3">
              <label for="filtreCategorie" class="form-label">Catégorie</label>
              <select id="filtreCategorie" class="form-select">
                <option value="tous">Toutes</option>
                <option value="bébé">Bébé</option>
                <option value="fille">Fille</option>
                <option value="garçon">Garçon</option>
              </select>
            </div>

            <div class="col-md-3">
              <label for="filtreTaille" class="form-label">Taille</label>
              <select id="filtreTaille" class="form-select">
                <option value="tous">Toutes</option>
                <option value="naissance">Naissance</option>
                <option value="1 mois">1 mois</option>
                <option value="3 mois">3 mois</option>
                <option value="6 mois">6 mois</option>
                <option value="9 mois">9 mois</option>
                <option value="12 mois">12 mois</option>
                <option value="18 mois">18 mois</option>
                <option value="24 mois">24 mois</option>
                <option value="2 ans">2 ans</option>
                <option value="3 ans">3 ans</option>
                <option value="4 ans">4 ans</option>
                <option value="5 ans">5 ans</option>
                <option value="6 ans">6 ans</option>
                <option value="8 ans">8 ans</option>
                <option value="10 ans">10 ans</option>
              </select>
            </div>

            <div class="col-md-3">
              <label for="filtreCollection" class="form-label">Collection</label>
              <select id="filtreCollection" class="form-select">
                <option value="toutes">Toutes</option>
                <option value="babetchka">Collection Babetchka</option>
                <option value="anna valognes">Collection Anna Valognes</option>
              </select>
            </div>

            <div class="col-md-3">
              <label for="filtreStatut" class="form-label">Statut</label>
              <select id="filtreStatut" class="form-select">
                <option value="tous">Tous</option>
                <option value="Disponible">Disponible</option>
                <option value="Réservé">Réservé</option>
                <option value="Vendu">Vendu</option>
              </select>
            </div>

            <div class="col-12">
              <label for="recherche" class="form-label">Recherche</label>
              <input
                type="text"
                id="recherche"
                class="form-control"
                placeholder="robe, velours, col claudine, rayures..."
              >
            </div>

          </div>
        </div>

        <div class="row g-4 product-grid" id="catalogueGrid"></div>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container text-center">
      <p class="mb-1">Babounette — Friperie vintage bébé & enfant</p>
      <p class="mb-1">6 Rue du Capitaine Alfred Dreyfus, 35000 Rennes</p>
      <p class="mb-0">
        <a href="mentions-legales.html">Mentions légales</a>
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/catalogue.js"></script>
</body>
</html>
